{%- assign t = page.lang | default: "en" -%}
{%- if t == "nl" -%}{%- assign data = site.data.nl -%}{%- assign locale = "nl-NL" -%}
{%- else -%}{%- assign data = site.data.en -%}{%- assign locale = "en-US" -%}{%- endif -%}
<div class="screenshot-grid">
  <figure class="screenshot-grid__item">
    <img src="{{ '/assets/screenshots/' | append: locale | append: '/01_greenShield.png' | relative_url }}" alt="{{ data.screenshots.alt.green }}" loading="lazy" decoding="async">
  </figure>
  <figure class="screenshot-grid__item">
    <img src="{{ '/assets/screenshots/' | append: locale | append: '/02_redShield.png' | relative_url }}" alt="{{ data.screenshots.alt.red }}" loading="lazy" decoding="async">
  </figure>
  <figure class="screenshot-grid__item">
    <img src="{{ '/assets/screenshots/' | append: locale | append: '/03_widgets.png' | relative_url }}" alt="{{ data.screenshots.alt.widgets }}" loading="lazy" decoding="async">
  </figure>
  <figure class="screenshot-grid__item">
    <img src="{{ '/assets/screenshots/' | append: locale | append: '/04_settings.png' | relative_url }}" alt="{{ data.screenshots.alt.settings }}" loading="lazy" decoding="async">
  </figure>
</div>
