{%- assign t = page.lang | default: "en" -%}
{%- if t == "nl" -%}{%- assign data = site.data.nl -%}{%- else -%}{%- assign data = site.data.en -%}{%- endif -%}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

<title>{{ page.meta_title | default: data.meta.title }}</title>
<meta name="description" content="{{ page.meta_description | default: data.meta.description }}">

<link rel="canonical" href="{{ site.url }}{{ page.url | default: '/' }}">
<link rel="alternate" hreflang="{{ data.lang }}" href="{{ site.url }}{{ page.url | default: '/' }}">
<link rel="alternate" hreflang="{{ page.hreflang_other }}" href="{{ site.url }}{{ page.hreflang_other_url }}">
<link rel="alternate" hreflang="x-default" href="{{ site.url }}/">

<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/icons/favicon-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/icons/favicon-16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">

<meta property="og:type" content="website">
<meta property="og:locale" content="{{ data.locale | replace: '-', '_' }}">
<meta property="og:title" content="{{ page.meta_title | default: data.meta.title }}">
<meta property="og:description" content="{{ page.meta_description | default: data.meta.description }}">
<meta property="og:url" content="{{ site.url }}{{ page.url | default: '/' }}">
<meta property="og:image" content="{{ site.url }}{{ data.meta.og_image | default: '/assets/og-en.png' }}">
<meta name="twitter:card" content="summary_large_image">

<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}?v={{ site.time | date: '%s' }}">

{%- seo title=false -%}
