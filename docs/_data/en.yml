    watchFace: "GluWink glucose and carbs as complications on an Apple Watch face."
    watchApp: "GluWink Watch app showing glucose, carbs, and how long ago they were read."

disclaimer:
  title: "Not a medical device."
  body: "GluWink does not replace your CGM, your pump, your endocrinologist, or your judgment. It does not make treatment decisions. It surfaces information that's already on the phone and asks one question: did you do the diabetes thing yet?"

