privacy_page:
  meta_title: "Privacy Policy — GluWink"
  meta_description: "GluWink does not collect any data. HealthKit data stays on the device. Nightscout data is read directly from your own server."
  title: "Privacy Policy"
  last_updated: "Last updated: 18 April 2026"
  intro: "GluWink is built so there is nothing to collect. This page exists because the App Store requires a privacy policy, not because we have data to disclose."
  sections:
    - heading: "What we collect"
      body: "Nothing. GluWink has no servers, no accounts, no analytics, and no third-party SDKs. Apple's standard App Store Connect crash reports are aggregated and anonymous — we do not run an additional crash reporter."
    - heading: "What stays on your device"
      body: "Glucose and carb data read from Apple HealthKit never leaves the device. Settings (excluded apps, glucose thresholds, glucose unit, badge mode, the carb grace period) live in the iOS App Group on your phone. Your passphrase is stored hashed (SHA-256 with a random salt) in the iOS Keychain on your phone."
    - heading: "Nightscout connections"
      body: "If you choose Nightscout as a data source, GluWink talks directly from your iPhone to the URL you provided. Your glucose, carb, and any other Nightscout data is exchanged between your iPhone and your Nightscout server only. No GluWink-operated server sits in between."
    - heading: "Apple Watch"
      body: "When the Apple Watch app is installed, the watch reads HealthKit on the watch itself. No data is uploaded anywhere; it is shared with the phone via Apple's standard WatchConnectivity framework only when the watch is in range."
    - heading: "Children's data (Family Sharing)"
      body: "When GluWink is set up on a child's device via Family Sharing, the same rules apply: nothing leaves the child's device beyond what HealthKit and (optionally) Nightscout normally do. The parent's role is configuration, not data collection."
    - heading: "Cookies and trackers on this site"
      body: "This marketing site has zero cookies and zero third-party scripts or trackers. Fonts and images are served from this domain only."
    - heading: "Changes to this policy"
      body: "If a future version of GluWink ever adds a feature that requires data collection (for example, push notifications via APNs), we will update this page first and link to it from the app's change log. The policy version is the \"Last updated\" date at the top."
    - heading: "Contact"
      body: "Questions or concerns? Open an issue on GitHub: https://github.com/FokkeZB/GluWink/issues."

support_page:
  meta_title: "Support — GluWink"
  meta_description: "Get help with GluWink. Common questions answered, plus a link to open an issue on GitHub."
  title: "Support"
  intro: "GluWink is a small, open-source project. The fastest path to help is opening a GitHub issue — it's how every bug report and feature request is tracked."
  cta_label: "Open an issue on GitHub"
  cta_url: "https://github.com/FokkeZB/GluWink/issues/new/choose"
  faq_heading: "Frequently asked questions"
  faqs:
    - q: "Where can I download the app?"
      a: "The App Store release isn't live yet. Until it is, you can build GluWink from source — see the README on GitHub for the iOS setup walkthrough. We'll update this page (and the home page) the moment it's available on the App Store."
    - q: "Does it work with my CGM?"
      a: "GluWink reads glucose and carb data from Apple Health. If your CGM app (Dexcom, Libre, CamAPS, xDrip, Loop, iAPS, and most others) writes to Apple Health, you're good. Alternatively, connect a Nightscout site — both sources can be on at the same time."
    - q: "What's the difference between the orange and red face?"
      a: "Orange means \"something needs attention\" — glucose is high or low, the sensor is stale, or carbs weren't entered. You run through the short check-in list, everything goes back to green. Red is reserved for a critical high: glucose has gone above a threshold you configure (the default is well into dangerous territory). At that point GluWink hides the check-in button — the shield cannot be dismissed until glucose drops below that threshold again. No passphrase override, no disarm. It's the one place in the app where the friction is deliberately absolute."
    - q: "Why doesn't shielding work in the iOS Simulator?"
      a: "Apple's Screen Time and Family Controls APIs only work on a physical device. The Simulator can run the app for layout and widget previews, but cannot block other apps."
    - q: "How do I set this up for my child?"
      a: "On the child's iPhone, install GluWink and authorize Family Controls when prompted (this requires Family Sharing to be set up with you as the family organizer). On your own iPhone, manage Screen Time for the child via Settings → Family → [child] → Screen Time. Disable \"Deleting Apps\" and \"Installing Apps\" so the child can't bypass the shield. Full prerequisites are in AGENTS.md on GitHub."
    - q: "I forgot my passphrase. What now?"
      a: "Delete and reinstall GluWink. The passphrase lives in the iOS Keychain and is wiped when the app is removed. Re-running setup creates a new one. (For child devices, deleting the app requires the parent's Apple ID, which is by design.)"
    - q: "Is GluWink a medical device?"
      a: "No. GluWink does not replace your CGM, your pump, your endocrinologist, or your judgment. It surfaces information that's already on the phone and asks one question: did you do the diabetes thing yet?"

