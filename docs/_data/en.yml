meta:
  title: "GluWink — diabetes status everywhere on your iPhone and Apple Watch"
  description: "GluWink turns your iPhone and Apple Watch from your biggest distraction into your best tool for diabetes. Glucose and carbs everywhere. Apps blocked when something needs your attention."
  og_image: /assets/og-en.png

