  switch_lang_label: "Nederlands"
  switch_lang_url: /nl/

hero:
  eyebrow: "Type 1 diabetes, on every screen"
  title: "From distraction to ally."
  subtitle: "Make your iPhone and Apple Watch a tool for diabetes — not a distraction from it."
  body: "Glucose and carbs everywhere — Home Screen, Lock Screen, StandBy, every Apple Watch face. Green when things look good, orange when something needs your attention, red when a critical high locks the shield until glucose drops. Other apps stay blocked until you've done the diabetes thing."
  cta_primary_label_pre_launch: "Coming soon to the App Store"
  cta_primary_label_post_launch: "Download on the App Store"
  cta_secondary_label: "Star the repo on GitHub"
  cta_app_store_url: "https://apps.apple.com/app/gluwink/id0000000000" # placeholder, update at launch
  cta_repo_url: "https://github.com/FokkeZB/GluWink"

three_things:
  title: "GluWink does three things, and nothing more."
  items:
    - heading: "Glucose and carbs visible everywhere."
      body: "Widgets in every size for Home Screen, Lock Screen, and StandBy. Complications on every Apple Watch face. An optional glucose number on the app icon badge."
    - heading: "Clear status at a glance."
      body: "A green face means everything looks good. Orange means something needs attention — glucose is high or low, the sensor is stale, or carbs were never entered for that meal. Red is reserved for a critical high: the shield cannot be dismissed until glucose drops back down. Same simple language across the app, widgets, and watch."
    - heading: "Optional app blocking — your call."
      body: "Block other apps at configurable intervals — always, or only when something needs your attention. While blocking is on and the face is orange, GluWink locks other apps until you check in. If the face goes red, the check-in is off the table entirely until glucose comes back down. Otherwise, your phone is just your phone."

audiences:
  title: "Built for two audiences."
  items:
    - tag: "For parents"
      heading: "Children with Type 1, on a Family-Sharing iPhone."
      bullets:
        - "Set GluWink up once on the child's iPhone via Family Sharing."
        - "Pick which apps stay free to use (the CGM app, school apps, phone, messages)."
        - "A passphrase only the parent knows protects the settings."
        - "The child cannot delete the app or skip the check-in."
        - "Glance at the home-screen badge or a widget to see how things are going."
    - tag: "For adults"
      heading: "Self-managing your own Type 1, on your own iPhone."
      bullets:
        - "Authorize GluWink for yourself — no Family Sharing required."
        - "Have a partner, spouse, or friend set the passphrase. The friction is the point."
        - "You can always uninstall — GluWink is honest about that. It nudges, it doesn't imprison."

data_sources:
  title: "Where the data comes from."
  intro: "GluWink reads what's already on your phone. No accounts to create. Pick whichever source fits."
  items:
    - heading: "Apple Health"
      body: "Most CGM apps (Dexcom, Libre, CamAPS, xDrip, Loop, iAPS, and others) already write glucose and carbs to Apple Health. If yours does, GluWink is a one-tap connection."
    - heading: "Nightscout"
      body: "Connect your own Nightscout site — handy when a parent monitors a child remotely, or when your diabetes system writes to Nightscout but not Apple Health. Both sources can be on at once; the most recent reading wins."
    - heading: "Demo mode"
      body: "Want to try the app first? Demo mode shows realistic glucose and carb data without any sensor."
  privacy_promise: "Your data stays on your device (HealthKit) or on the Nightscout site you control. No accounts, no servers we run, no analytics, no ads."

screenshots:
  title: "On every screen the phone has."
  intro: "Captured straight from the app — no mockups."
  alt:
    green: "GluWink check-in shield with a green face: glucose and carbs at a glance."
    orange: "GluWink check-in shield with an orange face: glucose high, follow the list, back to green."
    red: "GluWink check-in shield with a red face: glucose critically high, shield cannot be dismissed until glucose drops."
    widgets: "GluWink widgets in three sizes on the iPhone home screen."
