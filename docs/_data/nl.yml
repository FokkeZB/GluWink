three_things:
  title: "GluWink doet drie dingen, en niets meer."
  items:
    - heading: "Glucose en koolhydraten overal zichtbaar."
      body: "Widgets in alle formaten voor het beginscherm, het toegangsscherm en StandBy. Complicaties op elke Apple Watch-wijzerplaat. Optioneel de glucosewaarde als badge op het app-icoon."
    - heading: "Status in één oogopslag."
      body: "Een groen gezichtje betekent: alles ziet er goed uit. Een rood gezichtje betekent: er is iets dat aandacht vraagt — glucose te hoog of te laag, sensor verouderd, of koolhydraten van een maaltijd nog niet ingevoerd. Overal in de app, widgets en op de watch dezelfde eenvoudige taal."
    - heading: "Apps blokkeren is optioneel — jij bepaalt."
      body: "Kies om andere apps op instelbare intervallen te blokkeren: altijd, of alleen als iets je aandacht vraagt. Als blokkeren aanstaat en het gezichtje rood is, houdt GluWink andere apps op slot totdat de check-in is gedaan. Bij groen is je telefoon gewoon je telefoon."

audiences:
  title: "Voor twee doelgroepen."
  items:
    - tag: "Voor ouders"
      heading: "Kinderen met diabetes, op een iPhone via Delen met gezin."
      bullets:
        - "Eenmalig instellen op de iPhone van het kind via Delen met gezin."
        - "Kies welke apps vrij blijven (de CGM-app, schoolapps, telefoon, berichten)."
        - "Een wachtwoord dat alleen de ouder kent beschermt de instellingen."
        - "Het kind kan de app niet verwijderen en de check-in niet overslaan."
        - "Even op de badge of widget kijken laat direct zien hoe het gaat."
    - tag: "Voor volwassenen"
      heading: "Volwassenen met diabetes type 1, op je eigen iPhone."
      bullets:
        - "Autoriseer GluWink voor jezelf — Delen met gezin is niet nodig."
        - "Laat een partner of vriend(in) het wachtwoord zetten. Die wrijving is precies de bedoeling."
        - "Je kunt de app altijd verwijderen — daar is GluWink eerlijk over. Het duwt, het sluit niet op."

data_sources:
  title: "Waar de data vandaan komt."
  intro: "GluWink leest wat al op je telefoon staat. Geen accounts. Kies de bron die bij je past."
  items:
    - heading: "Apple Gezondheid"
      body: "De meeste CGM-apps (Dexcom, Libre, CamAPS, xDrip, Loop, iAPS en andere) schrijven glucose en koolhydraten al naar Apple Gezondheid. Doet die van jou dat ook, dan is GluWink in één tik verbonden."
    - heading: "Nightscout"
      body: "Verbind je eigen Nightscout-site — handig als een ouder op afstand meekijkt, of als jouw diabetessysteem wel naar Nightscout schrijft maar niet naar Apple Gezondheid. Beide bronnen kunnen tegelijk aanstaan; de meest recente meting wint."
    - heading: "Demo-modus"
      body: "Eerst even proberen? In de demo-modus zie je realistische glucose- en koolhydratenwaarden zonder sensor."
  privacy_promise: "Je gegevens blijven op je toestel (via HealthKit) of op je eigen Nightscout-site. Geen accounts, geen servers van ons, geen tracking, geen advertenties."

