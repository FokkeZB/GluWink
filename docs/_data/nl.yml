disclaimer:
  title: "Geen medisch hulpmiddel."
  body: "GluWink vervangt je CGM, je pomp, je internist en je eigen oordeel niet. Het neemt geen behandelbeslissingen. Het laat informatie zien die al op je telefoon staat en stelt één vraag: heb je dat diabetes-dingetje al gedaan?"

