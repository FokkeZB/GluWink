  eyebrow: "Diabetes type 1, op elk scherm"
  title: "Van afleider naar bondgenoot."
  subtitle: "Maak van je iPhone en Apple Watch een hulpmiddel voor diabetes — niet een afleiding ervan."
  body: "Glucose en koolhydraten overal — beginscherm, toegangsscherm, StandBy en elke Apple Watch-wijzerplaat. Een vriendelijk groen gezichtje als alles er goed uitziet, een rood gezichtje als iets je aandacht vraagt. Andere apps blijven op slot tot je dat diabetes-dingetje hebt gedaan."
