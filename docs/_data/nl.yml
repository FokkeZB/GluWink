privacy_page:
  meta_title: "Privacybeleid — GluWink"
  meta_description: "GluWink verzamelt geen gegevens. HealthKit-data blijft op je toestel. Nightscout-data wordt rechtstreeks van je eigen server gelezen."
  title: "Privacybeleid"
  last_updated: "Laatst bijgewerkt: 18 april 2026"
  intro: "GluWink is zo gebouwd dat er niets te verzamelen valt. Deze pagina bestaat omdat de App Store een privacybeleid vereist, niet omdat we gegevens te melden hebben."
  sections:
    - heading: "Wat we verzamelen"
      body: "Niets. GluWink heeft geen servers, geen accounts, geen analytics en geen third-party SDK's. De standaard, geanonimiseerde crash-rapporten van Apple via App Store Connect zijn er — wij draaien geen extra crash reporter."
    - heading: "Wat op je toestel blijft"
      body: "Glucose- en koolhydratengegevens uit Apple HealthKit verlaten je toestel niet. Instellingen (uitgesloten apps, glucosedrempels, glucose-eenheid, badge-modus, de koolhydraten-coulance) worden opgeslagen in de iOS App Group op je telefoon. Je wachtwoord ligt versleuteld (SHA-256 met willekeurig zout) in de iOS Keychain op je telefoon."
    - heading: "Nightscout-verbindingen"
      body: "Als je Nightscout als databron kiest, praat GluWink rechtstreeks vanaf je iPhone met de URL die je hebt opgegeven. Je glucose-, koolhydraten- en andere Nightscout-data wordt alleen tussen je iPhone en je Nightscout-server uitgewisseld. Er zit geen door GluWink beheerde server tussen."
    - heading: "Apple Watch"
      body: "Als de Apple Watch-app geïnstalleerd is, leest de watch HealthKit op de watch zelf. Er wordt niets ergens heen geüpload; de telefoon en de watch wisselen alleen via Apple's standaard WatchConnectivity-framework gegevens uit als de watch in de buurt is."
    - heading: "Gegevens van kinderen (Delen met gezin)"
      body: "Wanneer GluWink op het toestel van een kind wordt ingesteld via Delen met gezin, gelden dezelfde regels: er verlaat niets het toestel van het kind buiten wat HealthKit en (optioneel) Nightscout normaal al doen. De rol van de ouder is configureren, niet verzamelen."
    - heading: "Cookies en trackers op deze site"
      body: "Deze marketingsite gebruikt nul cookies en nul third-party scripts of trackers. Lettertypen en afbeeldingen worden alleen vanaf dit domein geserveerd."
    - heading: "Wijzigingen van dit beleid"
      body: "Als een toekomstige versie van GluWink een functie krijgt waarvoor wel gegevens verzameld moeten worden (bijvoorbeeld pushmeldingen via APNs), werken we eerst deze pagina bij en linken we ernaar vanuit de release-notities van de app. De versie van het beleid is de datum bovenaan."
    - heading: "Contact"
      body: "Vragen of zorgen? Open een issue op GitHub: https://github.com/FokkeZB/GluWink/issues."

support_page:
  meta_title: "Hulp — GluWink"
  meta_description: "Hulp bij GluWink. Veelgestelde vragen, plus een link om een issue op GitHub te openen."
  title: "Hulp"
  intro: "GluWink is een klein, open-source project. De snelste route naar hulp is een GitHub-issue openen — zo wordt elk bug-rapport en elke feature-aanvraag bijgehouden."
  cta_label: "Open een issue op GitHub"
  cta_url: "https://github.com/FokkeZB/GluWink/issues/new/choose"
  faq_heading: "Veelgestelde vragen"
  faqs:
    - q: "Waar kan ik de app downloaden?"
      a: "De App Store-release is nog niet live. Tot die tijd kun je GluWink zelf bouwen vanuit de broncode — zie de README op GitHub voor de iOS-setup-walkthrough. We werken deze pagina (en de homepage) bij zodra de app in de App Store staat."
    - q: "Werkt het met mijn CGM?"
      a: "GluWink leest glucose- en koolhydratengegevens uit Apple Gezondheid. Als jouw CGM-app (Dexcom, Libre, CamAPS, xDrip, Loop, iAPS en de meeste andere) naar Apple Gezondheid schrijft, ben je klaar. Alternatief: verbind een Nightscout-site — beide bronnen kunnen tegelijk aanstaan."
    - q: "Waarom werkt het schild niet in de iOS Simulator?"
      a: "Apple's Screen Time en Family Controls API's werken alleen op een fysiek toestel. De Simulator kan de app draaien voor layout- en widget-previews, maar kan andere apps niet blokkeren."
    - q: "Hoe stel ik dit in voor mijn kind?"
      a: "Installeer GluWink op de iPhone van het kind en autoriseer Family Controls als daarom wordt gevraagd (hiervoor moet Delen met gezin zijn ingesteld met jou als organisator). Beheer Schermtijd voor het kind vanaf je eigen iPhone via Instellingen → Familie → [kind] → Schermtijd. Schakel \"Verwijderen van apps\" en \"Installeren van apps\" uit zodat het kind het schild niet kan omzeilen. Volledige voorwaarden staan in AGENTS.md op GitHub."
    - q: "Ik ben mijn wachtwoord vergeten. Wat nu?"
      a: "Verwijder GluWink en installeer het opnieuw. Het wachtwoord ligt in de iOS Keychain en wordt gewist als de app wordt verwijderd. Bij het opnieuw doorlopen van de setup maak je een nieuw wachtwoord aan. (Op kindertoestellen vereist het verwijderen van de app het Apple-ID van de ouder, wat de bedoeling is.)"
    - q: "Is GluWink een medisch hulpmiddel?"
      a: "Nee. GluWink vervangt je CGM, je pomp, je internist en je eigen oordeel niet. Het laat informatie zien die al op je telefoon staat en stelt één vraag: heb je dat diabetes-dingetje al gedaan?"

